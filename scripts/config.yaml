meshes:
  dir: "sample_data/Medicine box OBJ_260324/2026-04-22"
  labels_dir: "textures/labels"
  use_labels: true           # procedural labels for non-textured bottles (fallback)
  unit_scale: 0.001          # OBJ verts are in mm, Blender works in meters
  copies_per_mesh: 7         # 7 meshes × 7 = 49 bottles per scene — denser pile, more occlusion variety
  # Per-class textured-mesh overrides. If a class name (mesh stem) is listed
  # here, the supplied UV-mapped OBJ + photoreal label texture replace the
  # original OBJ + procedural label. Other classes fall back to the
  # procedural path above. ASCII-staging of OBJ/MTL/texture handled by
  # stage_textured_mesh() at render time.
  textured:
    base_dir: "sample_data/Phama Bottle 3D Object/2026-04-29"
    bottles:
      "콜민A시럽":
        obj: "ver7/콜민A시럽_UV_mapped.obj"
        label_texture: "ver7/콜민A_texture.png"
      "레보진시럽":
        obj: "L/L_UV_mapped.obj"
        label_texture: "L/L_texture.png"

tray:
  inner_w: 0.70              # m (x) — sized to fit camera FOV at 1.286 m height
  inner_d: 0.45              # m (y)
  wall_h: 0.20               # m (z) — tall enough to contain bouncing bottles, not just static ones
  wall_t: 0.010              # m
  color: [0.55, 0.72, 0.90, 1.0]  # light blue like reference image

ground:
  size: 3.0                  # m (big plane under the tray so BG isn't black)
  color: [0.85, 0.85, 0.85, 1.0]

drop:
  x_range: [-0.22, 0.22]     # 3cm margin: enough to prevent escapees, wide enough to spread bottles
  y_range: [-0.12, 0.12]     # 3cm margin
  z_range: [0.30, 0.50]      # restore drop height so bottles separate in flight before piling up
  min_sim_time: 3
  max_sim_time: 6

camera:
  # Intel RealSense L515 intrinsics (from sample_data/camera.json)
  fx: 1349.4442138671875
  fy: 1350.024658203125
  cx: 988.072021484375
  cy: 559.8935546875
  width: 1920
  height: 1080
  # Top-down pose (matches your real extrinsics: t_z ≈ 1286 mm)
  height_m: 1.286
  jitter_xy_m: 0.02          # small positional jitter per scene
  jitter_rot_deg: 2.0        # small yaw/tilt jitter

lighting:
  n_lights: 3
  energy_range: [40, 120]        # dimmer than before to avoid overexposure
  height_range: [1.8, 2.5]
  world_strength: 0.4            # ambient world light

render:
  samples: 64                # low for speed; bump to 256 for final quality
  denoiser: "INTEL"
  depth_unit_mm: true        # save depth as uint16 mm to match sample_data

output:
  dir: "output"
  scenes: 1
  seed: 42
