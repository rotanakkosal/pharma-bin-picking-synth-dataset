meshes:
  dir: "sample_data/bottles"        # canonical layout — one ASCII-named folder per bottle id
  labels_dir: "textures/labels"
  use_labels: true                  # procedural labels for non-textured bottles (fallback)
  unit_scale: 0.001                 # OBJ verts are in mm, Blender works in meters
  copies_per_mesh: 7                # 7 meshes × 7 = 49 bottles per scene
  # Per-id textured-mesh overrides. If an id is listed here, the UV-mapped
  # OBJ + photoreal label texture replace the plain mesh.obj + procedural
  # label. Paths are relative to meshes.dir.
  textured:
    bottles:
      kolmin_a_syrup:
        obj: "kolmin_a_syrup/mesh_uv.obj"
        label_texture: "kolmin_a_syrup/label.png"
      levozin_syrup:
        obj: "levozin_syrup/mesh_uv.obj"
        label_texture: "levozin_syrup/label.png"

tray:
  inner_w: 0.70              # m (x) — sized to fit camera FOV at 1.286 m height
  inner_d: 0.45              # m (y)
  wall_h: 0.30               # m (z) — raised from 0.20 (2026-05-06): a 49-bottle pile easily
                             # exceeded 20cm; bottles rolled over the top. 30cm holds the pile.
  wall_t: 0.010              # m
  color: [0.55, 0.72, 0.90, 1.0]  # light blue like reference image

ground:
  size: 3.0                  # m (big plane under the tray so BG isn't black)
  color: [0.85, 0.85, 0.85, 1.0]

drop:
  x_range: [-0.22, 0.22]     # 13cm margin from each tray wall. 2026-05-08: tried tightening to [-0.15, 0.15] but escape rate got WORSE (63-67% vs 70-77%) — closer-spawned bottles collide mid-fall more, knocking each other out. Rolled back.
  y_range: [-0.12, 0.12]     # 10cm margin from each tray wall (rolled back from [-0.08, 0.08])
  z_range: [0.22, 0.30]      # 2026-05-06: lowered from [0.30, 0.50] to reduce impact velocity
                             # (was 2.4-3.1 m/s, now 1.5-2.4 m/s) → less bounce energy → fewer escapees
  min_sim_time: 3
  max_sim_time: 6

camera:
  # Intel RealSense L515 intrinsics (from sample_data/camera.json)
  fx: 1349.4442138671875
  fy: 1350.024658203125
  cx: 988.072021484375
  cy: 559.8935546875
  width: 1920
  height: 1080
  # Top-down pose. One height is sampled per scene from `heights_m`.
  # 1.286 m matches the real L515 extrinsics (t_z ≈ 1286 mm); the others
  # bracket realistic deployment-height variation. Chosen height is recorded
  # in scene_gt.json as `camera_height_m` so eval can bucket by height.
  heights_m: [1.1, 1.286, 1.4, 1.5]
  jitter_xy_m: 0.02          # small positional jitter per scene
  jitter_rot_deg: 2.0        # small yaw/tilt jitter

lighting:
  n_lights: 3
  energy_range: [40, 200]        # 2026-05-08: widened from [40,120] for more variety
  height_range: [1.8, 2.5]
  world_strength: 0.4            # ambient world light
  cct_range_k: [2500, 6500]      # 2026-05-08: SynTable-style color temperature randomization
                                 # (warm tungsten 2500K → cool daylight 6500K)

render:
  samples: 64                # low for speed; bump to 256 for final quality
  denoiser: "INTEL"
  depth_unit_mm: true        # save depth as uint16 mm to match sample_data

output:
  dir: "output"
  scenes: 1
  seed: 42
