meshes:
  dir: "sample_data/bottles"    
  labels_dir: "textures/labels"
  use_labels: true                  # procedural labels for non-textured bottles (fallback)
  unit_scale: 0.001                 # OBJ verts are in mm, Blender works in meters
  copies_per_mesh: 7                # 7 meshes × 7 = 49 bottles per scene
  textured:
    bottles:
      kolmin_a_syrup:
        obj: "kolmin_a_syrup/mesh_uv.obj"
        label_texture: "kolmin_a_syrup/label.png"
      levozin_syrup:
        obj: "levozin_syrup/mesh_uv.obj"
        label_texture: "levozin_syrup/label.png"

tray:
  inner_w: 0.70              # m (x) 
  inner_d: 0.45              # m (y)
  wall_h: 0.30               # m (z)
  wall_t: 0.010              # m
  color: [0.55, 0.72, 0.90, 1.0]  # light blue like reference image

ground:
  size: 3.0                  # m (big plane under the tray so BG isn't black)
  color: [0.85, 0.85, 0.85, 1.0]

drop:
  x_range: [-0.22, 0.22]     # 13cm margin from each tray wall.
  y_range: [-0.12, 0.12]     # 10cm margin from each tray wall 
  z_range: [0.22, 0.30]      

  min_sim_time: 3
  max_sim_time: 6

camera:
  # Intel RealSense L515 intrinsics (from sample_data/camera.json)
  fx: 1349.4442138671875
  fy: 1350.024658203125
  cx: 988.072021484375
  cy: 559.8935546875
  width: 1920
  height: 1080
  # 1.286 m matches the real L515 extrinsics (locked baseline per docs/team_workflow.md).
  # Single-element list = single height for every scene; round-robin in
  # generate_scene.py:319 trivially picks this one value.
  heights_m: [1.286]
  # Past sweep configs kept for reference; require team-lead sign-off + plan
  # doc entry before re-enabling (see docs/team_workflow.md "Locked baselines").
  # heights_m: [1.1, 1.286, 1.4, 1.5, 1.8]   # earlier multi-height sweep
  # heights_m: [0.7, 0.8, 0.9, 1.0]          # 2026-05-08 close-range exploratory sweep
  jitter_xy_m: 0.02          # small positional jitter per scene
  jitter_rot_deg: 2.0        # small yaw/tilt jitter

lighting:
  n_lights: 3
  energy_range: [40, 200]      
  height_range: [1.8, 2.5]
  world_strength: 0.4       
  cct_range_k: [2500, 6500]      # SynTable-style color temperature randomization
                                 # (warm tungsten 2500K → cool daylight 6500K)

render:
  samples: 64                # low for speed; bump to 256 for final quality
  denoiser: "INTEL"
  depth_unit_mm: true        # save depth as uint16 mm to match sample_data

output:
  dir: "output"
  scenes: 1
  seed: 42
